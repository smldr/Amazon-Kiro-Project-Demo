<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e1e2e">
  <title>OptimGame — Playing</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .game-page {
      max-width: 700px;
      margin: 0 auto;
      padding: var(--space-md);
      padding-bottom: calc(var(--space-md) + env(safe-area-inset-bottom, 0px));
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      overflow-x: hidden;
    }

    .fn-display {
      text-align: center;
      padding: var(--space-md) 0;
    }

    .vis-canvas {
      width: 100%;
      height: 250px;
      max-width: 100%;
    }

    .game-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-sm) 0;
      margin-top: auto;
      gap: var(--space-sm);
    }

    .game-footer .btn {
      min-height: 44px;
      min-width: 44px;
    }

    @media (min-width: 768px) {
      .game-page {
        max-width: 900px;
      }

      .game-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--space-lg);
        align-items: start;
      }

      .vis-canvas {
        height: 350px;
      }
    }

    /* Mobile: stack game content, reduce padding */
    @media (max-width: 767px) {
      .game-page {
        padding: var(--space-sm) var(--space-md);
        padding-bottom: calc(var(--space-sm) + env(safe-area-inset-bottom, 0px));
      }

      .game-content {
        display: flex;
        flex-direction: column;
        gap: var(--space-md);
      }

      .vis-canvas {
        height: 220px;
      }
    }

    /* Small screens: reduce canvas height to prevent scroll */
    @media (max-width: 374px) {
      .game-page {
        padding: var(--space-sm);
        gap: var(--space-sm);
      }

      .vis-canvas {
        height: 180px;
      }
    }

    .score-result-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 17, 27, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: var(--space-md);
      overflow-y: auto;
    }

    /* Score overlay: ensure it's scrollable on short mobile screens */
    @media (max-width: 767px) {
      .score-result-overlay {
        align-items: flex-start;
        padding-top: var(--space-xl);
      }

      .score-result-overlay .card {
        margin: 0 auto;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="game-page">

    <!-- Header -->
    <header class="game-header">
      <a href="index.html" class="btn btn--ghost" style="font-size: 0.8rem; padding: 6px 12px;">← Home</a>
      <span class="game-header__level" id="level-label">Level 1</span>
      <span class="game-header__budget" id="budget-label">Budget: 40</span>
    </header>

    <!-- Level Selector -->
    <nav class="level-selector" id="level-selector" aria-label="Level selection"></nav>

    <!-- Function Value Display -->
    <section class="fn-display">
      <div class="fn-value" id="fn-value">f(x) = 0.0000</div>
      <div class="ghost-value" id="ghost-display" style="display: none; margin-top: var(--space-xs); font-size: 0.85rem; color: var(--lavender, #b4befe);">
        AI (<span id="ghost-algorithm">CMA-ES</span>): f(x) = <span id="ghost-fn-value">0.0000</span> — Eval: <span id="ghost-eval-count">0</span>/<span id="ghost-total-evals">40</span>
      </div>
      <div class="progress-bar" style="margin-top: var(--space-sm);">
        <div class="progress-bar__fill" id="progress-fill" style="width: 0%;"></div>
      </div>
    </section>

    <!-- Game Content: Sliders + Visualisation -->
    <div class="game-content">
      <!-- Sliders -->
      <section class="card">
        <h2 style="margin-bottom: var(--space-sm); font-size: 0.85rem;" class="text-secondary">
          Adjust variables
        </h2>
        <div class="slider-group" id="slider-container"></div>
      </section>

      <!-- Visualisation -->
      <section class="vis-container" id="vis-container">
        <canvas class="vis-canvas" id="vis-canvas"></canvas>
      </section>
    </div>

    <!-- Submit Score Button (hidden in explore mode) -->
    <div class="submit-section" id="submit-section" style="display: none; text-align: center;">
      <button class="btn btn--primary" id="submit-score-btn" style="min-width: 180px;">
        Submit Score
      </button>
    </div>

    <!-- Score Result Overlay -->
    <div class="score-result-overlay" id="score-result-overlay" style="display: none;">
      <div class="card" style="text-align: center; max-width: 400px; margin: 0 auto; padding: var(--space-xl);">
        <h2 style="margin-bottom: var(--space-sm); color: var(--accent-primary);">Score Submitted!</h2>
        <div class="fn-value" id="final-score-display" style="margin-bottom: var(--space-md);">f(x) = 0.0000</div>
        <p class="text-secondary" id="rank-display" style="display: none; margin-bottom: var(--space-sm); color: var(--accent-secondary);"></p>
        <p class="text-secondary" id="evals-used-display" style="margin-bottom: var(--space-lg);"></p>

        <!-- AI Comparison Summary (visible in AI mode only) -->
        <div id="ai-comparison" class="ai-comparison" style="display: none;">
          <h3 class="ai-comparison__title">You vs. AI</h3>
          <div class="ai-comparison__row ai-comparison__row--player">
            <span class="ai-comparison__label">You:</span>
            <strong id="player-result" class="ai-comparison__value"></strong>
            <span class="ai-comparison__evals">in <span id="player-evals"></span> evals</span>
          </div>
          <div class="ai-comparison__row ai-comparison__row--ghost">
            <span class="ai-comparison__label" id="ghost-algorithm-label">CMA-ES:</span>
            <strong id="ghost-result" class="ai-comparison__value"></strong>
            <span class="ai-comparison__evals">in <span id="ghost-evals"></span> evals</span>
          </div>
          <p id="comparison-verdict" class="ai-comparison__verdict"></p>
        </div>

        <div style="display: flex; flex-direction: column; gap: var(--space-sm);">
          <button class="btn btn--primary btn--full" id="next-level-btn" style="display: none;">Next Level →</button>
          <a href="leaderboard.html" class="btn btn--secondary btn--full">📊 Leaderboard</a>
          <a href="index.html" class="btn btn--ghost btn--full">Back to Menu</a>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="game-footer">
      <a href="index.html" class="btn btn--ghost">← Back</a>
      <span class="text-muted mono" style="font-size: 0.75rem;" id="mode-label"></span>
    </footer>

  </main>

  <script type="module">
    import { initGame } from "./js/game.js";

    // Grab DOM elements
    const elements = {
      sliderContainer: document.getElementById("slider-container"),
      canvas: document.getElementById("vis-canvas"),
      fnValue: document.getElementById("fn-value"),
      progressFill: document.getElementById("progress-fill"),
      levelLabel: document.getElementById("level-label"),
      budgetLabel: document.getElementById("budget-label"),
      visContainer: document.getElementById("vis-container"),
      levelSelector: document.getElementById("level-selector"),
      submitSection: document.getElementById("submit-section"),
      submitBtn: document.getElementById("submit-score-btn"),
      scoreResultOverlay: document.getElementById("score-result-overlay"),
      finalScoreDisplay: document.getElementById("final-score-display"),
      rankDisplay: document.getElementById("rank-display"),
      evalsUsedDisplay: document.getElementById("evals-used-display"),
      ghostDisplay: document.getElementById("ghost-display"),
      ghostAlgorithm: document.getElementById("ghost-algorithm"),
      ghostFnValue: document.getElementById("ghost-fn-value"),
      ghostEvalCount: document.getElementById("ghost-eval-count"),
      ghostTotalEvals: document.getElementById("ghost-total-evals"),
      // AI comparison elements
      aiComparison: document.getElementById("ai-comparison"),
      playerResult: document.getElementById("player-result"),
      playerEvals: document.getElementById("player-evals"),
      ghostResult: document.getElementById("ghost-result"),
      ghostEvals: document.getElementById("ghost-evals"),
      ghostAlgorithmLabel: document.getElementById("ghost-algorithm-label"),
      comparisonVerdict: document.getElementById("comparison-verdict"),
      nextLevelBtn: document.getElementById("next-level-btn"),
    };

    // Initialise game
    const state = initGame(elements);

    // Show mode label
    const modeLabel = document.getElementById("mode-label");
    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode") || "explore";
    const nickname = params.get("nickname") || "player";
    modeLabel.textContent = `${mode} · ${nickname}`;
  </script>
</body>
</html>
